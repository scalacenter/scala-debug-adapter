name: Continuous Integration
on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "modules/**"
      - "project/**"
      - ".scalafmt.conf"
      - ".github/**"
      - "build.sbt"
      - "git-hook.sbt"

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  scalafmt:
    if: ${{(github.event_name == 'pull_request' && !contains(github.event.pull_request.body, '[skip ci]'))}}
    name: Check Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: ./bin/scalafmt --test
  cross-compilation:
    if: ${{(github.event_name == 'pull_request' && !contains(github.event.pull_request.body, '[skip ci]'))}}
    name: Cross Compilation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - uses: coursier/setup-action@v3.0.0
        with:
          apps: sbt
      - run: sbt +Test/compile
      # Verify the sbt 2.x cross-build of the plugin packages and its POM resolves
      - run: sbt sbtPlugin3/publishLocal
  test:
    if: ${{(github.event_name == 'pull_request' && !contains(github.event.pull_request.body, '[skip ci]'))}}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            jvm: 'adoptium:1.8.0-372'
          - os: windows-latest
            jvm: 'adoptium:1.11.0.19'
          - os: macOS-latest
            jvm: 'adoptium:1.17.0.7'
          - os: ubuntu-latest
            jvm: 'adoptium:1.20.0.1'
    name: Unit Tests on ${{ matrix.os }} -- ${{ matrix.jvm }}
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: true
    - uses: coursier/setup-action@v3.0.0
      with:
        jvm: ${{ matrix.jvm }}
        apps: sbt
    - name: Unit tests
      run: sbt test
      shell: bash
  scripted-test:
    if: ${{(github.event_name == 'pull_request' && !contains(github.event.pull_request.body, '[skip ci]'))}}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            jvm: 'adoptium:1.8.0-372'
          - os: ubuntu-latest
            jvm: 'adoptium:1.11.0.19'
          - os: macOS-latest
            jvm: 'adoptium:1.17.0.7'
            # sbt 2 requires JDK 17+, so only run its scripted tests where the JDK supports it
            sbt2: true
    name: Scripted Tests on ${{ matrix.os }} -- ${{ matrix.jvm }}
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: true
    - uses: coursier/setup-action@v3.0.0
      with:
        jvm: ${{ matrix.jvm }}
        apps: sbt
    - name: Scripted tests (sbt 1.x)
      run: sbt sbtPlugin2_12/scripted
      shell: bash
    # Runs only where the JDK supports sbt 2 (17+). Non-blocking for now: the sbt 2
    # debug session still fails at runtime (NullPointerException resolving sources),
    # which is tracked separately from the cross-build wiring.
    - name: Scripted tests (sbt 2.x)
      if: ${{ matrix.sbt2 }}
      continue-on-error: true
      run: sbt sbtPlugin3/scripted
      shell: bash
